<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You – VM Power Systems</title>
  <meta http-equiv="refresh" content="5;url=/">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Poppins', sans-serif;
      background: #0d2144;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .card {
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(201,162,39,.3);
      border-radius: 20px;
      padding: 3rem 2.5rem;
      max-width: 480px;
    }
    .icon {
      width: 80px; height: 80px;
      background: rgba(34,197,94,.15);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 2.2rem;
      margin: 0 auto 1.5rem;
      color: #22c55e;
    }
    h1 { font-size: 1.8rem; color: #fff; margin-bottom: .75rem; }
    p  { color: rgba(255,255,255,.7); line-height: 1.7; margin-bottom: 1.5rem; }
    .gold  { color: #c9a227; }
    a {
      display: inline-block;
      background: #c9a227;
      color: #0d2144;
      padding: .75rem 2rem;
      border-radius: 10px;
      font-weight: 700;
      text-decoration: none;
    }
    a:hover { background: #f0c040; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">&#10003;</div>
    <h1>Message Sent!</h1>
    <p>Thank you for reaching out to <span class="gold">VM Power Systems</span>.<br>Jaimin Patel will get back to you within <strong>24 hours</strong>.</p>
    <p style="font-size:.85rem; color:rgba(255,255,255,.45);">Redirecting to homepage in 5 seconds…</p>
    <a href="/">Back to Home</a>
  </div>
</body>
</html>
